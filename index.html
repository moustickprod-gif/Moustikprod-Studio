<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moustikprod Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: '#F4FAFB',
        surface: '#FFFFFF',
        accent: '#024059',
        accent2: '#3CD6D1',
        ink: '#024059',
        muted: '#5C7D87',
        line: '#DCE6E9'
      },
      fontFamily: {
        display: ['Poppins', 'sans-serif'],
        body: ['Poppins', 'sans-serif'],
        mono: ['Poppins', 'sans-serif']
      }
    }
  }
}
</script>

<style>
  body { background:#F4FAFB; color:#024059; font-family:'Poppins',sans-serif; }
  .font-display { font-family:'Poppins',sans-serif; font-weight:600; }
  .font-mono { font-family:'Poppins',sans-serif; font-weight:500; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:#DCE6E9; border-radius:4px; }
  ::-webkit-scrollbar-track { background:transparent; }

  [x-cloak] { display:none !important; }

  .fade-enter { transition: opacity .15s ease; }
  .card-slide-enter { animation: cardSlide .25s ease both; }
  @keyframes cardSlide { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }

  .modal-slide-enter { animation: modalSlide .2s ease both; }
  @keyframes modalSlide { from { opacity:0; transform:translateY(16px) scale(.98); } to { opacity:1; transform:translateY(0) scale(1); } }

  .timeline-track { display:flex; height:6px; border-radius:4px; overflow:hidden; background:#DCE6E9; }
  .timeline-seg { height:100%; }

  .skeleton { background:linear-gradient(90deg,#DCE6E9 25%,#eef5f6 37%,#DCE6E9 63%); background-size:400% 100%; animation: sk 1.4s ease infinite; border-radius:6px; }
  @keyframes sk { 0%{background-position:100% 50%} 100%{background-position:0 50%} }

  .spinner { width:16px; height:16px; border:2px solid color-mix(in srgb, currentColor 25%, transparent); border-top-color:currentColor; border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  textarea, input, select { background:#FFFFFF; }
  textarea:focus, input:focus, select:focus { outline:none; box-shadow:0 0 0 2px #3CD6D1; }
</style>
</head>
<body class="font-body antialiased" x-data="app()" x-init="init()" x-cloak>

<!-- ===================== LOGIN ===================== -->
<div x-show="!authReady || !user" class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-2">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="20" height="14" rx="2" stroke="#3CD6D1" stroke-width="2"/><path d="M2 10h20M6 6v4M11 6v4M16 6v4" stroke="#3CD6D1" stroke-width="2"/></svg>
        <span class="font-display font-bold text-2xl">Moustikprod <span class="text-accent">Studio</span></span>
      </div>
      <p class="text-muted text-sm font-mono">Gestion de production vidéo</p>
    </div>

    <div class="bg-surface border border-line rounded-xl p-6" x-show="authReady">
      <h2 class="font-display font-bold text-lg mb-4" x-text="authMode==='login' ? 'Connexion' : 'Créer un compte'"></h2>
      <form @submit.prevent="authMode==='login' ? doLogin() : doSignup()" class="space-y-3">
        <input type="email" x-model="authEmail" placeholder="Email" required class="w-full px-3 py-2 rounded-lg border border-line text-sm">
        <input type="password" x-model="authPassword" placeholder="Mot de passe" required class="w-full px-3 py-2 rounded-lg border border-line text-sm">
        <p x-show="authError" x-text="authError" class="text-xs text-accent"></p>
        <button type="submit" class="w-full bg-accent text-white font-medium py-2 rounded-lg hover:opacity-90 transition flex items-center justify-center gap-2">
          <span x-show="authLoading" class="spinner"></span>
          <span x-text="authMode==='login' ? 'Se connecter' : 'Créer le compte'"></span>
        </button>
      </form>
      <button @click="authMode = authMode==='login' ? 'signup' : 'login'" class="text-xs text-muted mt-4 hover:text-ink transition w-full text-center">
        <span x-text="authMode==='login' ? 'Pas de compte ? Créer un compte' : 'Déjà un compte ? Se connecter'"></span>
      </button>
    </div>
  </div>
</div>

<!-- ===================== APP SHELL ===================== -->
<div x-show="authReady && user" class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <aside :class="sidebarOpen ? 'w-56' : 'w-16'" class="bg-surface border-r border-line flex flex-col transition-all duration-200 shrink-0">
    <div class="flex items-center gap-2 px-4 h-16 border-b border-line shrink-0">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="shrink-0"><rect x="2" y="6" width="20" height="14" rx="2" stroke="#3CD6D1" stroke-width="2"/><path d="M2 10h20M6 6v4M11 6v4M16 6v4" stroke="#3CD6D1" stroke-width="2"/></svg>
      <span x-show="sidebarOpen" class="font-display font-bold text-sm whitespace-nowrap">Moustikprod</span>
    </div>
    <nav class="flex-1 py-4 space-y-1 px-2">
      <template x-for="item in navItems" :key="item.id">
        <button @click="view = item.id" :class="view===item.id ? 'bg-accent/15 text-accent border-l-2 border-accent' : 'text-muted hover:text-ink hover:bg-bg border-l-2 border-transparent'"
          class="w-full flex items-center gap-3 px-3 py-2.5 rounded-md text-sm font-medium transition">
          <span x-html="item.icon" class="shrink-0 w-5 h-5"></span>
          <span x-show="sidebarOpen" class="whitespace-nowrap" x-text="item.label"></span>
        </button>
      </template>
    </nav>
    <div class="p-2 border-t border-line">
      <button @click="sidebarOpen = !sidebarOpen" class="w-full flex items-center justify-center py-2 text-muted hover:text-ink transition">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" :style="sidebarOpen ? '' : 'transform:rotate(180deg)'"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- TOPBAR -->
    <header class="h-16 border-b border-line flex items-center justify-between px-6 shrink-0">
      <div class="flex items-center gap-3">
        <h1 class="font-display font-bold text-lg" x-text="navItems.find(n=>n.id===view)?.label || (view==='nouveau-projet' ? 'Nouveau projet' : '')"></h1>
        <span x-show="db && user" class="text-xs font-mono px-2 py-0.5 rounded bg-accent/15 text-accent border border-accent/30 flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full" :class="syncStatus==='syncing' ? 'bg-amber-400 animate-pulse' : syncStatus==='error' ? 'bg-red-500' : 'bg-emerald-400'"></span>
          <span x-text="syncStatus==='syncing' ? 'Synchronisation...' : syncStatus==='error' ? 'Erreur de sync' : 'Synchronisé avec le CRM' + (lastSyncAt ? ' · ' + lastSyncAt : '')"></span>
        </span>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative" x-show="view==='projets'">
          <input x-model="searchQuery" id="search-input" placeholder="Rechercher... (/)" class="text-sm px-3 py-1.5 rounded-lg border border-line w-56">
        </div>
        <button @click="goToNewProject()" class="bg-accent text-white text-sm font-medium px-3 py-1.5 rounded-lg hover:opacity-90 transition flex items-center gap-1.5">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Nouveau projet
        </button>
        <button @click="logout()" class="text-muted hover:text-ink text-sm">Déconnexion</button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6">

      <!-- ============ DASHBOARD ============ -->
      <template x-if="view==='dashboard'">
        <div class="space-y-6" x-transition.opacity.duration.150ms>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-surface border border-line rounded-xl p-5">
              <p class="text-muted text-xs font-mono mb-1">EN COURS</p>
              <p class="font-display font-bold text-3xl" x-text="projects.filter(p=>!['livraison','facture'].includes(p.status)).length"></p>
            </div>
            <div class="bg-surface border border-line rounded-xl p-5">
              <p class="text-muted text-xs font-mono mb-1">LIVRÉS CE MOIS</p>
              <p class="font-display font-bold text-3xl" x-text="projects.filter(p=>p.status==='livraison' && isThisMonth(p.deadline)).length"></p>
            </div>
            <div class="bg-surface border border-line rounded-xl p-5">
              <p class="text-muted text-xs font-mono mb-1">EN ATTENTE VALIDATION</p>
              <p class="font-display font-bold text-3xl" x-text="projects.filter(p=>p.status==='brief').length"></p>
            </div>
          </div>

          <div class="bg-surface border border-line rounded-xl p-5">
            <div class="flex items-center gap-2 mb-3">
              <span class="text-accent text-lg">✦</span>
              <h3 class="font-display font-bold">Claude suggère</h3>
              <span x-show="aiSuggestLoading" class="spinner"></span>
            </div>
            <div x-show="!aiSuggestLoading && aiSuggestions.length" class="space-y-2">
              <template x-for="(s,i) in aiSuggestions" :key="i">
                <div class="text-sm flex gap-2 p-2 rounded-lg bg-bg border border-line">
                  <span class="text-accent font-mono">→</span>
                  <span x-text="s"></span>
                </div>
              </template>
            </div>
            <div x-show="!aiSuggestLoading && !aiSuggestions.length && aiSuggestError" class="text-sm text-muted">
              <span x-text="aiSuggestError"></span>
              <button @click="loadSuggestions()" class="text-accent hover:underline ml-2">Réessayer</button>
            </div>
          </div>

          <div>
            <h3 class="font-display font-bold mb-3">Projets récents</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <template x-for="p in projects.slice(0,3)" :key="p.id">
                <div @click="openProject(p)" class="bg-surface border border-line rounded-xl p-4 cursor-pointer hover:border-accent/50 transition">
                  <div class="timeline-track mb-3" x-html="renderTimeline(p)"></div>
                  <p class="font-display font-bold text-sm truncate" x-text="p.title"></p>
                  <p class="text-muted text-xs mt-1" x-text="p.client"></p>
                  <span class="text-xs font-mono px-2 py-0.5 rounded mt-2 inline-block" :style="statusStyle(p.status)" x-text="statusLabel(p.status)"></span>
                </div>
              </template>
            </div>
          </div>

          <div class="flex gap-3">
            <button @click="goToNewProject()" class="bg-surface border border-line rounded-lg px-4 py-2 text-sm hover:border-accent/50 transition">+ Nouveau projet</button>
            <button @click="view='studio'; studioType='script'" class="bg-surface border border-line rounded-lg px-4 py-2 text-sm hover:border-accent/50 transition">+ Nouveau script</button>
            <button @click="view='studio'; studioType='shotlist'" class="bg-surface border border-line rounded-lg px-4 py-2 text-sm hover:border-accent/50 transition">+ Nouvelle shot list</button>
          </div>
        </div>
      </template>

      <!-- ============ PROJETS ============ -->
      <template x-if="view==='projets'">
        <div x-transition.opacity.duration.150ms>
          <div class="flex gap-2 mb-5 flex-wrap">
            <template x-for="f in [{slug:'Tous',label:'Tous'}, ...statusPipeline]" :key="f.slug">
              <button @click="statusFilter=f.slug" :class="statusFilter===f.slug ? 'bg-accent text-white' : 'bg-surface text-muted border border-line'" class="text-xs font-mono px-3 py-1.5 rounded-lg transition" x-text="f.label"></button>
            </template>
          </div>

          <div x-show="filteredProjects.length===0" class="text-center py-20 text-muted">
            <p class="mb-3">Aucun projet pour le moment.</p>
            <button @click="goToNewProject()" class="bg-accent text-white px-4 py-2 rounded-lg text-sm">Créer mon premier projet</button>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <template x-for="p in filteredProjects" :key="p.id">
              <div @click="openProject(p)" class="card-slide-enter relative group bg-surface border border-line rounded-xl p-5 cursor-pointer hover:border-accent/50 transition">
                <button @click.stop="confirmDeleteProject(p)" title="Supprimer le projet" class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 text-muted hover:text-red-500 transition p-1 z-10">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
                <div class="timeline-track mb-4" x-html="renderTimeline(p)"></div>
                <div class="flex items-start justify-between">
                  <div>
                    <p class="font-display font-bold" x-text="p.title"></p>
                    <p class="text-muted text-sm" x-text="p.client + ' · ' + p.type + (p.type==='Série / Épisodes' && p.nbEpisodes ? ' (' + p.nbEpisodes + ' épisodes)' : '')"></p>
                    <span x-show="p.secteurClient" class="text-xs font-mono text-accent" x-text="p.secteurClient"></span>
                  </div>
                  <span class="text-xs font-mono px-2 py-0.5 rounded shrink-0" :style="statusStyle(p.status)" x-text="statusLabel(p.status)"></span>
                </div>
                <div class="flex items-center justify-between mt-4 text-xs text-muted font-mono">
                  <span x-text="'Deadline: ' + (p.deadline || '—')"></span>
                  <span x-text="p.progress + '%'"></span>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- ============ DETAIL PROJET ============ -->
      <template x-if="view==='detail' && currentProject">
        <div x-transition.opacity.duration.150ms class="max-w-4xl">
          <div class="flex items-center justify-between mb-4">
            <button @click="view='projets'" class="text-muted text-sm hover:text-ink flex items-center gap-1">← Retour aux projets</button>
            <button @click="confirmDeleteProject(currentProject)" class="text-xs text-muted hover:text-red-500 flex items-center gap-1 transition">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
              Supprimer le projet
            </button>
          </div>

          <div class="bg-surface border border-line rounded-xl p-5 mb-5">
            <div class="timeline-track mb-4" x-html="renderTimeline(currentProject)"></div>
            <div class="flex items-start justify-between gap-4">
              <input x-model="currentProject.title" @blur="saveProjects()" class="font-display font-bold text-xl bg-transparent border-0 focus:ring-0 w-full px-0">
              <div class="flex items-center gap-2 shrink-0">
                <select x-model="currentProject.status" @change="saveProjects()" class="text-xs font-mono px-2 py-1.5 rounded-lg border border-line">
                  <template x-for="s in statusPipeline" :key="s.slug">
                    <option :value="s.slug" x-text="s.label"></option>
                  </template>
                </select>
                <button @click="currentProject.status='livraison'; currentProject.progress=100; saveProjects()" class="text-xs bg-accent2 text-ink font-medium px-3 py-1.5 rounded-lg">Marquer livré</button>
              </div>
            </div>
            <div class="flex items-center justify-between mt-2">
              <p class="text-muted text-sm" x-text="currentProject.client + ' · ' + currentProject.type + ' · Deadline: ' + (currentProject.deadline || '—')"></p>
              <div class="flex items-center gap-2">
                <button @click="createDevisInCrm()" class="text-xs bg-surface border border-line px-3 py-1.5 rounded-lg hover:border-accent/50 transition">Créer un devis →</button>
                <button @click="currentProject.shareEnabled ? copyShareLink() : toggleShare()" class="text-xs px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition" :class="currentProject.shareEnabled ? 'bg-accent/15 text-accent border border-accent/30' : 'bg-surface border border-line hover:border-accent/50'">
                  <span x-text="currentProject.shareEnabled ? 'Copier le lien client' : 'Partager avec le client'"></span>
                </button>
                <button @click="toggleShare()" x-show="currentProject.shareEnabled" class="text-xs text-muted hover:text-red-500">Désactiver</button>
                <a x-show="currentProject.notionUrl" :href="currentProject.notionUrl" target="_blank" class="text-xs text-accent hover:underline">Voir dans Notion ↗</a>
                <button @click="exportToNotion()" class="text-xs bg-surface border border-line px-3 py-1.5 rounded-lg flex items-center gap-2 hover:border-accent/50 transition">
                  <span x-show="notionExportLoading" class="spinner"></span>
                  <span x-text="currentProject.notionUrl ? 'Mettre à jour Notion' : 'Exporter vers Notion'"></span>
                </button>
                <button @click="confirmDeleteProject()" class="text-xs bg-surface border border-red-200 text-red-500 px-3 py-1.5 rounded-lg hover:bg-red-50 transition">Supprimer</button>
              </div>
            </div>
            <p x-show="notionExportError" class="text-xs text-accent mt-1" x-text="notionExportError"></p>
          </div>

          <div x-show="!projectSuggestionDismissed && (projectSuggestionLoading || projectSuggestion)" class="bg-accent2/10 border border-accent2/30 rounded-xl p-4 mb-5 flex items-center justify-between gap-4">
            <p class="text-sm flex items-center gap-2">
              <span class="text-accent2">✦</span>
              <span x-show="projectSuggestionLoading" class="text-muted">Claude réfléchit à la prochaine étape…</span>
              <span x-show="!projectSuggestionLoading"><span class="font-mono text-xs text-muted uppercase mr-1">Prochaine étape suggérée</span> — <span x-text="projectSuggestion"></span></span>
            </p>
            <button @click="dismissProjectSuggestion()" class="text-muted hover:text-ink text-sm shrink-0" title="Ignorer">✕</button>
          </div>

          <div x-show="!currentProject.pitch && !currentProject.scenario && !briefBannerDismissed && !autoBriefLoading" class="bg-accent/10 border border-accent/30 rounded-xl p-4 mb-5 flex items-center justify-between gap-4">
            <p class="text-sm">
              <span class="text-accent">✦</span>
              Ce projet n'a pas encore de brief. Génère-le en 1 clic pour préparer ta prod.
            </p>
            <div class="flex items-center gap-3 shrink-0">
              <button @click="detailTab='pitch'; regeneratePitch()" class="text-xs bg-accent text-white px-3 py-1.5 rounded-lg whitespace-nowrap">Générer le brief →</button>
              <button @click="briefBannerDismissed=true" class="text-muted hover:text-ink text-sm" title="Ignorer">✕</button>
            </div>
          </div>

          <div class="flex gap-1 border-b border-line mb-5 overflow-x-auto">
            <template x-for="t in ['pitch','moodboard','scenario','decoupage','logistique','captions','suivi']" :key="t">
              <button @click="detailTab=t" :class="detailTab===t ? 'border-accent text-accent' : 'border-transparent text-muted hover:text-ink'" class="px-4 py-2 text-sm font-medium border-b-2 transition whitespace-nowrap" x-text="{pitch:'Pitch',moodboard:'Moodboard & Références',scenario:'Scénario',decoupage:'Découpage technique',logistique:'Logistique',captions:'Captions / Réseaux',suivi:'Suivi'}[t]"></button>
            </template>
          </div>

          <!-- PITCH TAB -->
          <div x-show="detailTab==='pitch'" class="space-y-4">
            <p x-show="autoBriefLoading" class="text-sm text-accent flex items-center gap-2"><span class="spinner"></span> ✦ Génération du brief en cours…</p>
            <div class="bg-surface border-l-4 border-accent2 rounded-xl p-5">
              <p class="text-accent2 font-mono text-xs mb-2 uppercase">Pitch</p>
              <textarea x-model="currentProject.pitch" @blur="saveProjects()" rows="4" :disabled="autoBriefLoading" placeholder="Le pitch généré apparaîtra ici..." class="w-full bg-transparent border-0 text-sm p-0"></textarea>
            </div>
            <div class="bg-accent2/10 border-l-4 border-accent2 rounded-xl p-5">
              <p class="text-accent2 font-mono text-xs mb-2 uppercase">💡 Idées</p>
              <textarea x-model="currentProject.idees" @blur="saveProjects()" rows="3" placeholder="Idées créatives..." class="w-full bg-transparent border-0 text-sm p-0"></textarea>
            </div>
            <div class="bg-accent/10 border-l-4 border-accent rounded-xl p-5">
              <p class="text-accent font-mono text-xs mb-2 uppercase">❗ À penser</p>
              <textarea x-model="currentProject.aPenser" @blur="saveProjects()" rows="3" placeholder="Points de vigilance..." class="w-full bg-transparent border-0 text-sm p-0"></textarea>
            </div>
            <div class="flex gap-2">
              <button @click="regeneratePitch()" class="bg-surface border border-line rounded-lg px-4 py-2 text-sm hover:border-accent/50 transition flex items-center gap-2">
                <span x-show="pitchLoading" class="spinner"></span> ↺ Régénérer le brief
              </button>
              <button @click="exploreAngles()" class="bg-surface border border-line rounded-lg px-4 py-2 text-sm hover:border-accent/50 transition flex items-center gap-2">
                <span x-show="exploreAnglesLoading" class="spinner"></span> ✦ Explorer 3 angles
              </button>
            </div>
            <p x-show="pitchError" class="text-xs text-accent" x-text="pitchError"></p>
            <p x-show="exploreAnglesError" class="text-xs text-accent" x-text="exploreAnglesError"></p>

            <div x-show="creativeAngles.length" class="space-y-3">
              <p class="text-xs text-muted font-mono uppercase">Angles créatifs</p>
              <template x-for="(angle,i) in creativeAngles" :key="i">
                <div class="bg-surface border border-line rounded-xl p-4 space-y-2">
                  <p class="font-display font-bold text-sm" x-text="angle.title"></p>
                  <p class="text-sm text-muted" x-text="angle.description"></p>
                  <button @click="useAngle(angle)" class="text-xs text-accent hover:underline">Partir de cet angle →</button>
                </div>
              </template>
            </div>
          </div>

          <!-- MOODBOARD TAB -->
          <div x-show="detailTab==='moodboard'" class="space-y-4">
            <div class="bg-surface border-l-4 border-accent2 rounded-xl p-5">

              </select>

            <!-- Interview -->
            <div x-show="studioType==='interview'" class="bg-surface border border-line rounded-xl p-5 space-y-3">
              <input x-model="studioForm.profil" placeholder="Profil de l'interviewé" class="w-full text-sm px-3 py-2 rounded-lg border border-line">
              <input x-model="studioForm.themeInterview" placeholder="Thème" class="w-full text-sm px-3 py-2 rounded-lg border border-line">
              <input x-model="studioForm.dureeInterview" placeholder="Durée de l'interview" class="w-full text-sm px-3 py-2 rounded-lg border border-line">
              <select x-model="studioForm.styleInterview" class="w-full text-sm px-3 py-2 rounded-lg border border-line">
                <option>Journalistique</option><option>Conversationnel</option><option>Inspirant</option>

            <!-- Email -->
            <div x-show="studioType==='email'" class="bg-surface border border-line rounded-xl p-5 space-y-3">

              </select>
              <select x-model="studioForm.tonEmail" class="w-full text-sm px-3 py-2 rounded-lg border border-line">
                <option>Formel</option><option>Amical</option><option>Direct</option>
              </select>
            </div>

            <button @click="runStudio()" class="bg-accent text-white text-sm font-medium px-4 py-2 rounded-lg flex items-center gap-2">
              <span x-show="studioLoading" class="spinner"></span> Générer
            </button>
            <p x-show="studioError" class="text-xs text-accent" x-text="studioError"></p>

              <div class="flex gap-2 mb-3">
                <button @click="runStudio()" class="text-xs bg-surface border border-line px-3 py-1.5 rounded-lg">Régénérer</button>
                <button @click="copyText(studioResult)" class="text-xs bg-surface border border-line px-3 py-1.5 rounded-lg">Copier tout</button>
                <button @click="saveToProjectOpen=true" class="text-xs bg-surface border border-line px-3 py-1.5 rounded-lg">Sauvegarder dans un projet</button>
              </div>
              <div class="text-sm whitespace-pre-wrap max-h-[500px] overflow-y-auto leading-relaxed" x-text="studioResult"></div>
            </div>
          </div>
        </div>
      </template>

      <!-- ============ IDÉES ============ -->
      <template x-if="view==='idees'">
        <div x-transition.opacity.duration.150ms class="max-w-3xl">
          <div>
            <div class="flex items-center justify-between mb-4">
              <p class="text-muted text-sm">Alimenté automatiquement chaque semaine — ou à la demande.</p>
              <div class="flex gap-2">
                <button @click="generateCompetitiveAnalysis()" class="bg-surface border border-line text-sm font-medium px-3 py-1.5 rounded-lg flex items-center gap-2 hover:border-accent/50 transition">

                <button @click="generateManualIdea()" class="bg-accent text-white text-sm font-medium px-3 py-1.5 rounded-lg flex items-center gap-2">
                  <span x-show="manualIdeaLoading" class="spinner"></span> Générer maintenant

              </div>
            </div>
            <p x-show="manualIdeaError" class="text-xs text-accent mb-3" x-text="manualIdeaError"></p>
            <p x-show="competitiveError" class="text-xs text-accent mb-3" x-text="competitiveError"></p>
            <div x-show="ideasLoading" class="text-muted text-sm mb-4">Chargement…</div>
            <div x-show="!ideasLoading && ideasList.length===0" class="text-center py-20 text-muted">
              Aucune étude pour l'instant. La tâche hebdomadaire alimentera cet onglet automatiquement, ou clique "Générer maintenant".
            </div>
            <div class="space-y-2">
              <template x-for="(entry,idx) in ideasList" :key="entry.id">
                <div class="bg-surface border border-line rounded-xl card-slide-enter overflow-hidden">

                    <div class="flex items-center gap-2 min-w-0">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="shrink-0 text-muted transition-transform" :style="expandedIdeaId===entry.id ? 'transform:rotate(90deg)' : ''"><path d="M9 6l6 6-6 6"/></svg>

                      <span x-show="entry.type==='concurrence'" class="text-xs font-mono px-1.5 py-0.5 rounded bg-accent2/20 text-accent2 shrink-0">Concurrence</span>
                      <p x-show="expandedIdeaId!==entry.id" class="text-muted text-xs truncate" x-text="(entry.idees||[]).length + ' idée(s)'"></p>
                    </div>
                    <span @click.stop="deleteIdea(entry.id)" class="text-xs text-muted hover:text-accent shrink-0">Supprimer</span>
                  </button>

                    <div x-show="entry.idees && entry.idees.length">
                      <p class="text-accent2 font-mono text-xs mb-1 uppercase">💡 Idées</p>
                      <ul class="list-disc pl-5 space-y-1 text-sm">
                        <template x-for="(idea,i) in (entry.idees||[])" :key="i">

      <!-- ============ CLIENTS ============ -->
      <template x-if="view==='clients'">
        <div x-transition.opacity.duration.150ms>
          <input x-model="clientSearch" placeholder="Rechercher un client..." class="text-sm px-3 py-2 rounded-lg border border-line w-72 mb-5">
          <div x-show="filteredClients.length===0" class="text-center py-20 text-muted">Aucun client. Les clients apparaissent en créant des projets.</div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <template x-for="c in filteredClients" :key="c.name">
              <div @click="openClient(c)" class="bg-surface border border-line rounded-xl p-4 cursor-pointer hover:border-accent/50 transition">
                <p class="font-display font-bold" x-text="c.name"></p>
                <p class="text-muted text-xs mt-1" x-text="c.count + ' projet(s)'"></p>
              </div>
            </template>
          </div>

          <div x-show="currentClient" class="mt-6 bg-surface border border-line rounded-xl p-5 max-w-2xl">
            <div class="flex items-center justify-between mb-4">
              <h3 class="font-display font-bold text-lg" x-text="currentClient?.name"></h3>
              <button @click="goToNewProject(currentClient?.name)" class="text-xs bg-accent text-white px-3 py-1.5 rounded-lg">Nouveau projet pour ce client</button>
            </div>
            <div class="space-y-2">
              <template x-for="p in projects.filter(p=>p.client===currentClient?.name)" :key="p.id">
                <div @click="openProject(p)" class="flex items-center justify-between p-3 bg-bg border border-line rounded-lg cursor-pointer">
                  <span class="text-sm" x-text="p.title"></span>
                  <span class="text-xs font-mono px-2 py-0.5 rounded" :style="statusStyle(p.status)" x-text="statusLabel(p.status)"></span>
                </div>

      <!-- ============ RÉGLAGES ============ -->
      <template x-if="view==='reglages'">
        <div class="max-w-2xl space-y-5" x-transition.opacity.duration.150ms>
          <div class="bg-surface border border-line rounded-xl p-5">
            <h3 class="font-display font-bold mb-3">Données partagées</h3>
            <p class="text-xs text-muted" x-show="db && user">✓ Connecté au même projet Firebase que le CRM Moustikprod — clients et projets sont synchronisés automatiquement entre les deux apps.</p>
          </div>

          <div class="bg-surface border border-line rounded-xl p-5">
            <h3 class="font-display font-bold mb-3">Firebase</h3>
            <p class="text-xs text-muted">Config chargée depuis les variables d'environnement Vercel (non éditable ici).</p>
          </div>

          <div class="bg-surface border border-line rounded-xl p-5">
            <h3 class="font-display font-bold mb-3">Claude API</h3>
            <p class="text-sm">Clé API : <span class="font-mono text-muted">••••••••••••</span></p>
            <p class="text-sm mt-1">Modèle : <span class="font-mono text-accent">claude-sonnet-4-6</span></p>

          <div class="bg-surface border border-line rounded-xl p-5">
            <h3 class="font-display font-bold mb-3">Profil</h3>
            <input x-model="settings.profileName" @blur="saveSettings()" placeholder="Nom" class="w-full text-sm px-3 py-2 rounded-lg border border-line mb-2">
            <input x-model="settings.billingInfo" @blur="saveSettings()" placeholder="Infos de facturation" class="w-full text-sm px-3 py-2 rounded-lg border border-line">
          </div>

          <div class="bg-surface border border-line rounded-xl p-5">
            <h3 class="font-display font-bold mb-3">Données</h3>
            <div class="flex gap-2 flex-wrap">
              <button @click="exportData()" class="text-xs bg-surface border border-line px-3 py-1.5 rounded-lg">Export JSON</button>
              <label class="text-xs bg-surface border border-line px-3 py-1.5 rounded-lg cursor-pointer">
                Import JSON
                <input type="file" @change="importData($event)" accept=".json" class="hidden">
              </label>
              <button @click="resetData()" class="text-xs bg-accent/15 text-accent border border-accent/30 px-3 py-1.5 rounded-lg">Reset</button>
            </div>
          </div>
        </div>
      </template>

    </main>
  </div>
</div>

<!-- ===================== MODAL SAVE TO PROJECT ===================== -->
<div x-show="deleteProjectConfirmOpen" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" @keydown.escape.window="deleteProjectConfirmOpen=false">
  <div class="modal-slide-enter bg-surface border border-line rounded-xl w-full max-w-sm p-6" x-show="deleteProjectConfirmOpen">
    <h3 class="font-display font-bold text-lg mb-2">Supprimer le projet</h3>
    <p class="text-sm text-muted mb-6">Cette action est irréversible. Le projet sera supprimé définitivement.</p>
    <div class="flex gap-3">
      <button @click="deleteProjectConfirmOpen=false; projectPendingDelete=null" class="flex-1 text-sm border border-line rounded-lg px-4 py-2 hover:bg-bg transition">Annuler</button>
      <button @click="deleteProject()" class="flex-1 text-sm bg-red-500 text-white rounded-lg px-4 py-2 hover:bg-red-600 transition">Supprimer</button>

  <div class="modal-slide-enter bg-surface border border-line rounded-xl w-full max-w-md p-6" x-show="saveToProjectOpen">
    <h3 class="font-display font-bold text-lg mb-4">Sauvegarder dans un projet</h3>
    <div class="space-y-2 max-h-64 overflow-y-auto">
      <template x-for="p in projects" :key="p.id">
        <button @click="saveStudioResultToProject(p)" class="w-full text-left text-sm p-2 rounded-lg bg-bg border border-line hover:border-accent/50" x-text="p.title"></button>
      </template>
    </div>
    <button @click="saveToProjectOpen=false" class="w-full mt-4 text-sm text-muted">Annuler</button>
  </div>
</div>

<!-- ===================== TOASTS ===================== -->
<div class="fixed bottom-4 right-4 space-y-2 z-50">
  <template x-for="t in toasts" :key="t.id">
    <div class="px-4 py-2.5 rounded-lg text-sm shadow-lg" :class="t.type==='error' ? 'bg-accent text-white' : 'bg-accent2 text-ink'" x-text="t.msg"></div>
  </template>
</div>

<script>
function app() {
  return {
    // auth
    authReady: false, user: null, authMode: 'login', authEmail: '', authPassword: '', authError: '', authLoading: false,
    firebaseEnabled: false,
    syncStatus: 'ok', // 'ok' | 'syncing' | 'error'
    lastSyncAt: '',

    // nav
    sidebarOpen: true,
    view: 'dashboard',
    navItems: [
      { id:'dashboard', label:'Dashboard', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>' },
      { id:'projets', label:'Projets', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20M6 6v4M11 6v4M16 6v4"/></svg>' },
      { id:'studio', label:'Studio IA', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 20l-2.5-6.5L3 11l6.5-2.5z"/></svg>' },
      { id:'idees', label:'Idées', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 00-4 12.7V17h8v-2.3A7 7 0 0012 2z"/></svg>' },
      { id:'clients', label:'Clients', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0116 0v1"/></svg>' },
      { id:'reglages', label:'Réglages', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 008.6 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H2a2 2 0 110-4h.09A1.65 1.65 0 003.6 8.6a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H8a1.65 1.65 0 001-1.51V2a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V8a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>' },
    ],

    // data
    projects: [],
    allClients: [],
    ideasList: [], ideasLoading: false, expandedIdeaId: null,
    manualIdeaLoading: false, manualIdeaError: '',
    competitiveLoading: false, competitiveError: '',
    db: null,
    statusFilter: 'Tous',
    searchQuery: '',
    currentProject: null,
    detailTab: 'pitch',

    // dashboard ai
    aiSuggestLoading: false, aiSuggestions: [], aiSuggestError: '',

    // page "Nouveau projet" — quick add + brief créatif optionnel
    newProject: { title:'', clientSelect:'', clientNew:'', type:'', budget:'', deadline:'', briefOpen:false, briefContext:'' },
    newProjectBriefLoading: false, newProjectBriefError: '',
    creatingProject: false,
    briefBannerDismissed: false,
    projectSuggestion: '', projectSuggestionLoading: false, projectSuggestionDismissed: false,

    // detail generation states
    pitchLoading: false, pitchError: '', autoBriefLoading: false,
    exploreAnglesLoading: false, exploreAnglesError: '', creativeAngles: [],
    moodboardLoading: false, moodboardError: '',
    scenarioCritiqueLoading: false, scenarioCritiqueError: '', scenarioCritique: null,
    decoupageLoading: false, decoupageError: '',
    scenarioLoading: false, scenarioError: '',
    logistiqueLoading: false, logistiqueError: '',
    captionsLoading: false, captionsError: '',
    newChecklistItem: '', newMatosItem: '',
    notionExportLoading: false, notionExportError: '',

    // statuts projet — pipeline unifié, partagé avec le CRM (mêmes slugs stockés en Firestore)
    statusPipeline: [
      { slug:'prospection',     label:'Prospection' },
      { slug:'brief',           label:'Brief' },
      { slug:'pre-production',  label:'Pré-production' },
      { slug:'tournage',        label:'Tournage' },
      { slug:'montage',         label:'Montage' },
      { slug:'livraison',       label:'Livraison' },
      { slug:'facture',         label:'Facturé' },
    ],

    // studio
    studioType: 'script',
    studioTypes: [
      { id:'script', label:'Script vidéo', desc:'Script complet formaté' },
      { id:'shotlist', label:'Shot list express', desc:'Liste de plans adaptée' },
      { id:'idees', label:'Idées de contenu', desc:'10 idées de vidéos' },
      { id:'captions', label:'Captions & hooks', desc:'5 hooks + caption' },
      { id:'interview', label:'Questions d\'interview', desc:'15 questions structurées' },
      { id:'email', label:'Email client', desc:'Email pro prêt à envoyer' },
    ],
    studioForm: { equip: [] },
    studioSelectedProjectId: '',
    studioResult: '', studioLoading: false, studioError: '',
    studioHistory: [],
    saveToProjectOpen: false,
    deleteProjectConfirmOpen: false,
    projectPendingDelete: null,

    // clients
    clientSearch: '', currentClient: null,

    // settings
    settings: { profileName:'Moustikprod', billingInfo:'' },

    // toasts
    toasts: [],

    init() {
      this.loadSettings();
      this.bindShortcuts();
      this.initFirebase();
      this.handleDeepLinkParams();
    },
    // Supporte les liens du type /nouveau-projet?titre=...&type=...&contexte=...
    // (utile pour des liens externes ou des intégrations qui veulent pré-remplir
    // la création de projet sans passer par l'UI Idées).
    handleDeepLinkParams() {
      const params = new URLSearchParams(location.search);
      const titre = params.get('titre');
      if (!titre) return;
      this.goToNewProject();
      this.newProject.title = titre;
      const type = params.get('type');
      if (type) this.newProject.type = type;
      const contexte = params.get('contexte');
      if (contexte) {
        this.newProject.briefContext = contexte;
        this.newProject.briefOpen = true;
      }
      history.replaceState({}, '', '/');
    },

    // ---------- AUTH ----------
    // Studio partage le projet Firebase du CRM (mêmes comptes, mêmes données
    // clients/projets en sous-collections Firestore).
    async initFirebase() {
      try {
        const res = await fetch('/api/firebase-config');
        const cfg = await res.json();
        if (cfg.apiKey && window.firebase) {
          firebase.initializeApp(cfg);
          this.firebaseEnabled = true;
          firebase.auth().onAuthStateChanged(async u => {
            this.user = u;
            this.authReady = true;
            if (u) {
              this.db = firebase.firestore();
              await this.loadData();
              this.loadSuggestions();
            }
          });
        } else {
          this.authReady = true;
          this.user = null;
        }
      } catch(e) {
        this.authReady = true;
        this.user = null;
      }
    },
    doLogin() {
      this.authError=''; this.authLoading=true;
      if (!this.firebaseEnabled) { this.authError='Firebase non configuré.'; this.authLoading=false; return; }
      firebase.auth().signInWithEmailAndPassword(this.authEmail, this.authPassword)
        .catch(e => this.authError = e.message)
        .finally(() => this.authLoading=false);
    },
    doSignup() {
      this.authError=''; this.authLoading=true;
      if (!this.firebaseEnabled) { this.authError='Firebase non configuré.'; this.authLoading=false; return; }
      firebase.auth().createUserWithEmailAndPassword(this.authEmail, this.authPassword)
        .catch(e => this.authError = e.message)
        .finally(() => this.authLoading=false);
    },
    logout() {
      this.user = null;
      if (this.firebaseEnabled) firebase.auth().signOut();
    },

    // ---------- SHORTCUTS ----------
    bindShortcuts() {
      window.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
          if (e.key === 'Escape') { this.saveToProjectOpen=false; e.target.blur(); }
          return;
        }
        if (e.key === 'n') this.goToNewProject();
        if (e.key === '/') { e.preventDefault(); this.view='projets'; this.$nextTick?.(()=>{}); setTimeout(()=>document.getElementById('search-input')?.focus(),50); }
        if (e.key === 'Escape') { this.saveToProjectOpen=false; }
      });
    },

    // ---------- TOASTS ----------
    toast(msg, type='success') {
      const id = Date.now();
      this.toasts.push({ id, msg, type });
      setTimeout(() => { this.toasts = this.toasts.filter(t=>t.id!==id); }, 3000);
    },

    // ---------- STORAGE ----------
    loadSettings() {
      const s = localStorage.getItem('mp_studio_settings');
      if (s) this.settings = { ...this.settings, ...JSON.parse(s) };
    },
    saveSettings() {
      localStorage.setItem('mp_studio_settings', JSON.stringify(this.settings));
      this.toast('Réglages enregistrés');
    },
    saveProjects() {
      if (this.currentProject) this.saveProjectDoc(this.currentProject);
    },
    // Mode connecté — clients et projets partagés avec le CRM via Firestore
    // (users/{uid}/clients/{id} et users/{uid}/projets/{id}), chaque fiche dans
    // son propre document pour ne jamais écraser les données de l'autre app.
    async loadData() {
      const uid = this.user.uid;
      this.syncStatus = 'syncing';
      try {
        const [clientsSnap, projetsSnap] = await Promise.all([
          this.db.collection('users').doc(uid).collection('clients').get(),
          this.db.collection('users').doc(uid).collection('projets').get(),
        ]);
        this.allClients = clientsSnap.docs.map(d => d.data());
        this.projects = projetsSnap.docs.map(d => this.projetDocToStudio(d.data()));
        const h = localStorage.getItem('mp_studio_history');
        if (h) this.studioHistory = JSON.parse(h);
        this.loadIdeas();
        this.syncStatus = 'ok';
        this.lastSyncAt = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
      } catch(e) {
        console.error('Firestore loadData error', e);
        this.syncStatus = 'error';
        this.toast('Erreur de chargement des données', 'error');
      }
    },
    // Études + idées générées chaque semaine par la tâche Cowork, via

    weekLabelNow() {
      const now = new Date();
      const monday = new Date(now);
      monday.setDate(monday.getDate() - ((monday.getDay() + 6) % 7));
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      const fmt = (d) => d.toLocaleDateString('fr-FR', { day:'numeric', month:'long' });
      return { weekStart: monday.toISOString().slice(0,10), weekLabel: `Semaine du ${fmt(monday)} au ${fmt(sunday)}` };
    },

    async resolveClientId(name) {
      const trimmed = (name||'').trim();
      if (!trimmed) return '';
      const existing = this.allClients.find(c => (c.nom||'').toLowerCase() === trimmed.toLowerCase());
      if (existing) return existing.id;
      const newClient = { id:'c'+Date.now(), nom:trimmed, entreprise:'', email:'', telephone:'', adresse:'', codePostal:'', ville:'', siret:'', notes:'', typeClient:'b2b', contacts:[], dateCreation:new Date().toISOString() };
      await this.db.collection('users').doc(this.user.uid).collection('clients').doc(newClient.id).set(newClient);
      this.allClients.push(newClient);
      return newClient.id;
    },
    // Persiste un projet vers Firestore (partagé avec le CRM). Appelé après
    // chaque modification de currentProject.
    async saveProjectDoc(project) {
      if (!this.db || !this.user) return;
      this.syncStatus = 'syncing';
      try {
        let clientId = project.clientId;
        if (!clientId && project.client) clientId = await this.resolveClientId(project.client);
        project.clientId = clientId || '';
        if (clientId && project.secteurClient) {
          const client = this.allClients.find(c => c.id === clientId);
          if (client && !client.secteur) {
            await this.db.collection('users').doc(this.user.uid).collection('clients').doc(clientId).set({ secteur: project.secteurClient }, { merge:true });
            client.secteur = project.secteurClient;
          }
        }
        const docData = {
          id: project.id,
          titre: project.title,
          clientId: project.clientId,
          statut: project.statutCrm || 'prospection',
          statutStudio: project.status,
          typeVideo: project.type,
          secteurClient: project.secteurClient || '',
          budgetStudio: project.budget,
          deadlineStudio: project.deadline,
          progress: project.progress,
          pitch: project.pitch || '',
          idees: project.idees || '',
          aPenser: project.aPenser || '',
          scenario: project.scenario || '',
          decoupage: project.decoupage || [],
          matos: project.matos || [],
          lieu: project.lieu || '',
          moodboardNotes: project.moodboardNotes || '',
          captions: project.captions || {},
          checklist: project.checklist || [],
          notes: project.notes || '',
          notionPageId: project.notionPageId || null,
          notionUrl: project.notionUrl || null,
          shareToken: project.shareToken || null,
          shareEnabled: !!project.shareEnabled,
          dateCreation: project.dateCreation || new Date().toISOString(),
        };
        await this.db.collection('users').doc(this.user.uid).collection('projets').doc(project.id).set(docData, { merge:true });
        this.syncStatus = 'ok';
        this.lastSyncAt = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
      } catch(e) {
        console.error('Firestore saveProjectDoc error', e);
        this.syncStatus = 'error';
        this.toast('Erreur de synchronisation', 'error');
      }
    },
    // ---------- HELPERS ----------
    isThisMonth(dateStr) {
      if (!dateStr) return false;
      const d = new Date(dateStr), now = new Date();
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    },
    statusLabel(slug) {
      const s = this.statusPipeline.find(s => s.slug === slug);
      return s ? s.label : slug;
    },
    statusStyle(status) {
      const map = {
        'prospection':'background:#5C7D8722;color:#5C7D87;border:1px solid #5C7D8744',
        'brief':'background:#3CD6D122;color:#024059;border:1px solid #3CD6D155',
        'pre-production':'background:#02405922;color:#024059;border:1px solid #02405944',
        'tournage':'background:#02405933;color:#024059;border:1px solid #02405955',
        'montage':'background:#3CD6D133;color:#024059;border:1px solid #3CD6D166',
        'livraison':'background:#1FAF8822;color:#1FAF88;border:1px solid #1FAF8844',
        'facture':'background:#1FAF8844;color:#1FAF88;border:1px solid #1FAF8866',
      };
      return map[status] || map['brief'];
    },
    renderTimeline(p) {
      const stages = this.statusPipeline.map(s => s.slug);
      const idx = stages.indexOf(p.status);
      const colors = ['#5C7D87','#3CD6D1','#024059','#024059','#3CD6D1','#1FAF88','#1FAF88'];
      return stages.map((s,i) => `<div class="timeline-seg" style="flex:1;background:${i<=idx ? colors[i] : '#DCE6E9'}"></div>`).join('');
    },
    copyText(text) {
      navigator.clipboard.writeText(text || '');
      this.toast('Copié dans le presse-papier');
    },

    // ---------- CLAUDE PROXY ----------
    async callClaude(systemPrompt, userMessage) {
      const res = await fetch('/api/claude.js', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({
          system: systemPrompt,
          messages: [{ role:'user', content: userMessage }]
        })
      });
      const data = await res.json();
      if (data.error || !data.content) throw new Error(data.error?.message || data.error || 'Erreur Claude API');
      return data.content[0].text;
    },
    extractJson(text) {
      const match = text.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
      if (!match) throw new Error('Réponse non JSON');
      return JSON.parse(match[0]);
    },

    // ---------- DASHBOARD AI ----------
    async loadSuggestions() {
      this.aiSuggestLoading = true; this.aiSuggestError='';
      try {
        const ctx = this.projects.map(p => `${p.title} (${p.client}) - statut: ${p.status}, avancement: ${p.progress}%, deadline: ${p.deadline}`).join('\n');

          `Projets en cours:\n${ctx}\n\nDonne 3 suggestions courtes, une par ligne, sans numérotation ni markdown.`
        );
        this.aiSuggestions = text.split('\n').map(l=>l.replace(/^[-•\d.]+\s*/,'').trim()).filter(Boolean).slice(0,3);
      } catch(e) {
        this.aiSuggestError = 'Claude indisponible.';

    // ---------- PROJECTS LIST ----------
    get filteredProjects() {
      return this.projects.filter(p => {
        const statusOk = this.statusFilter==='Tous' || p.status===this.statusFilter;
        const q = this.searchQuery.toLowerCase();
        const searchOk = !q || p.title.toLowerCase().includes(q) || p.client.toLowerCase().includes(q);
        return statusOk && searchOk;
      });
    },
    openProject(p) {
      this.currentProject = p;
      this.detailTab = 'pitch';
      this.briefBannerDismissed = false;
      this.view = 'detail';

      this.projectSuggestionDismissed = localStorage.getItem('mp_suggestion_dismissed_' + p.id) === '1';

    dismissProjectSuggestion() {
      this.projectSuggestionDismissed = true;
      if (this.currentProject) localStorage.setItem('mp_suggestion_dismissed_' + this.currentProject.id, '1');
    },
    async loadProjectSuggestion(project, attempt) {
      if (this.projectSuggestionDismissed) return;
      this.projectSuggestionLoading = true;
      try {
        const today = new Date().toISOString().slice(0,10);
        const text = await this.callClaude(
          'Tu es un assistant de production vidéo.',
          `Ce projet en est là :\n- Titre : ${project.title}, Client : ${project.client || 'non précisé'}\n- Statut : ${this.statusLabel(project.status)}\n- Pitch : ${project.pitch ? 'rempli' : 'vide'}\n- Scénario : ${project.scenario ? 'rempli' : 'vide'}\n- Shot list : ${(project.decoupage||[]).length ? 'remplie' : 'vide'}\n- Deadline : ${project.deadline || 'non définie'}\n- Aujourd'hui : ${today}\n\nEn une phrase courte et directe (max 15 mots), quelle est la prochaine action concrète la plus importante pour faire avancer ce projet ?\nCommence par un verbe à l'impératif. Exemple : "Envoie le brief validé à Roussel Judicael avant vendredi."`
        );
        if (this.currentProject && this.currentProject.id === project.id) this.projectSuggestion = text.trim();
      } catch(e) {
        if (!attempt && this.currentProject && this.currentProject.id === project.id) {
          this.projectSuggestionLoading = false;
          return this.loadProjectSuggestion(project, 1);
        }
        // échec après retry — l'encart reste simplement masqué
      } finally {
        this.projectSuggestionLoading = false;
      }

    async toggleShare() {
      if (!this.currentProject) return;
      if (!this.currentProject.shareEnabled) {

        await this.saveProjectDoc(this.currentProject);
        const url = `${location.origin}/share.html?token=${this.currentProject.shareToken}`;

    detectVideoTypeFromText(text) {
      const lower = text.toLowerCase();
      if (/tiktok|reels|short/.test(lower)) return 'TikTok';
      if (/vlog|van|nomade|aventure/.test(lower)) return 'Vlog';
      if (/corporate|entreprise|marque/.test(lower)) return 'Film de marque';
      return '';
    },

      const title = ideaText.split(/\s—\s|\s-\s|:/)[0].trim().slice(0, 80) || ideaText.slice(0, 80);

      this.newProject.briefOpen = true;
      this.newProject.briefContext = ideaText;

        );

    parseAngles(text) {
      const matches = [...text.matchAll(/\*\*ANGLE\s*\d+\s*—\s*([^*]+)\*\*/gi)];
      return matches.map((m, i) => {
        const start = m.index + m[0].length;
        const end = i + 1 < matches.length ? matches[i + 1].index : text.length;
        return { title: m[1].trim(), description: text.slice(start, end).trim() };
      });
    },

        const text = await this.callClaude(
          'Tu es directeur artistique expert en production vidéo documentaire.',
          `Pour ce projet :\n- Titre : ${p.title}\n- Type : ${p.type || 'non précisé'}\n- Pitch : ${p.pitch || 'non renseigné'}\n\nPropose des références cohérentes avec ce pitch. Réponds en JSON avec ces clés exactes : refVisuelles (string — films, clips, photographes, colorimétrie), refSonores (string — ambiance, artistes, BPM, mood musical), ton (string — un seul mot parmi : Documentaire immersif, Contemplatif, Dynamique, Intimiste, Épique, Autre).`
        );
        const j = this.extractJson(text);
        this.currentProject.moodboardRefVisuelles = j.refVisuelles || this.currentProject.moodboardRefVisuelles;
        this.currentProject.moodboardRefSonores = j.refSonores || this.currentProject.moodboardRefSonores;
        if (j.ton) this.currentProject.moodboardTon = j.ton;
        this.saveProjects();
        this.toast('Références suggérées');
      } catch(e) {
        this.moodboardError = 'Erreur Claude. Réessaie.';
      } finally {
        this.moodboardLoading = false;
      }
    },
    decoupagePrompt() {
      const p = this.currentProject;
      const moodboardCtx = (p.moodboardRefVisuelles || p.moodboardRefSonores || p.moodboardTon)
        ? `\n\nRéférences moodboard à respecter :\n- Visuelles : ${p.moodboardRefVisuelles || 'aucune'}\n- Sonores : ${p.moodboardRefSonores || 'aucune'}\n- Ton narratif : ${p.moodboardTon || 'non précisé'}`
        : '';
      return `Tu es un 1er assistant caméra expert en tournage vidéo.\nGénère une shot list pour ce projet.${moodboardCtx}\n\nGénère 8 à 12 plans. Pour chaque plan, réponds UNIQUEMENT avec ce format JSON array (sans markdown) :\n[\n  {"plan": "01", "focale": "Grand angle 16mm", "description": "Plan d'ouverture — vue d'ensemble du lieu", "heure": "08:00", "intention": "Contemplatif", "son": "Ambiance naturelle"},\n  ...\n]\n\nintention doit être l'une de : Contemplatif, Descriptif, Immersif, Dynamique, Émotionnel.\nson doit être l'un de : Ambiance naturelle, Voix off, Musique, Silence, Interview.\nSois précis et concis. Un plan = une ligne JSON.`;
    },
    async generateDecoupage() {
      this.decoupageLoading = true; this.decoupageError='';
      try {
        const p = this.currentProject;
        const scenarioContext = p.scenario && p.scenario.length > 3000
          ? p.scenario.slice(0, 3000) + '...[tronqué]'
          : p.scenario || 'non renseigné';
        const userMessage = `Titre : ${p.title}\nType : ${p.type || 'non précisé'}\nClient : ${p.client || 'non précisé'}\nScénario (résumé) : ${scenarioContext}`;
        const text = await this.callClaude(this.decoupagePrompt(), userMessage);
        const jsonMatch = text.match(/\[[\s\S]*\]/);
        if (!jsonMatch) throw new Error('Réponse non JSON');
        const plans = JSON.parse(jsonMatch[0]);
        this.currentProject.decoupage = plans.map(pl => ({
          plan: pl.plan || '', focale: pl.focale || '', description: pl.description || '',
          heure: pl.heure || '', intention: pl.intention || '', son: pl.son || '', fait: false, transition: !!pl.transition,
        }));
        this.saveProjects();
        this.toast('Découpage technique généré');
      } catch(e) {
        console.error('[Découpage] Erreur Claude API:', e);
        this.decoupageError = 'Erreur Claude. Réessaie.';
      } finally {
        this.decoupageLoading = false;
      }
    },
    copyDecoupage() {
      const rows = (this.currentProject.decoupage||[]).map(s => `${s.plan} — ${s.focale} — ${s.description} (${s.heure})${s.intention ? ' — intention: '+s.intention : ''}${s.son ? ' — son: '+s.son : ''}`);
      this.copyText(rows.join('\n'));
    },
    scenarioPromptFor(type) {
      const map = {
        'Film de marque': 'Génère un scénario / script voix-off professionnel pour une vidéo Film de marque.',
        'TikTok/Reels': 'Génère un scénario format 5C (Contexte, Cap, Conflit, Changement, Conclusion) pour TikTok/Reels.',
        'Interview': 'Génère un guide de questions structuré pour une interview.',
        'Vlog': 'Génère une trame narrative avec temps forts pour un vlog.',
      };
      return map[type] || 'Génère un scénario vidéo professionnel adapté au type de vidéo.';
    },
    async generateScenario() {
      this.scenarioLoading = true; this.scenarioError='';
      try {
        this.currentProject.scenario = await this.callClaude(
          `Tu es scénariste vidéo professionnel. ${this.scenarioPromptFor(this.currentProject.type)}`,
          this.projectContext()
        );
        this.saveProjects();
        this.toast('Scénario généré');
      } catch(e) {
        this.scenarioError = 'Erreur Claude. Réessaie.';
      } finally {
        this.scenarioLoading = false;
      }
    },
    async analyzeScenario() {
      if ((this.currentProject.scenario || '').length <= 50) {
        this.scenarioCritiqueError = "Écris d'abord un scénario.";
        return;
      }
      this.scenarioCritiqueLoading = true; this.scenarioCritiqueError = '';
      try {
        const p = this.currentProject;
        const text = await this.callClaude(
          'Tu es un script doctor expert en vidéo courte (vlog, Film de marque, TikTok).',
          `Analyse ce scénario pour une vidéo ${p.type || 'vidéo'} intitulée "${p.title}" pour le client ${p.client || 'non précisé'} :\n\n---\n${p.scenario}\n---\n\nRéponds en 3 sections séparées par ===SECTION=== :\n\nSECTION 1 — CE QUI EST FORT :\n2-3 points forts précis (cite des éléments du scénario).\n\n===SECTION===\n\nSECTION 2 — CE QUI EST FAIBLE OU MANQUE :\n2-3 problèmes concrets avec suggestions de correction.\n\n===SECTION===\n\nSECTION 3 — VERSION AMÉLIORÉE :\nRéécris le scénario en corrigeant les faiblesses. Garde la structure de l'auteur, renforce les passages faibles. Commence directement par le texte réécrit.`
        );
        const stripHeading = s => (s || '').trim().replace(/^[\s\S]*?SECTION\s*\d+\s*—[^\n]*\n+/i, '').trim();
        const [strengths, weaknesses, improved] = text.split('===SECTION===').map(stripHeading);
        this.scenarioCritique = { strengths: strengths || '', weaknesses: weaknesses || '', improved: improved || '' };
      } catch(e) {
        this.scenarioCritiqueError = 'Erreur Claude. Réessaie.';
      } finally {
        this.scenarioCritiqueLoading = false;
      }
    },
    useImprovedScenario() {
      if (!this.scenarioCritique?.improved) return;
      if (!confirm('Remplacer ton scénario par la version améliorée ?')) return;
      this.currentProject.scenario = this.scenarioCritique.improved;
      this.saveProjects();
      this.scenarioCritique = null;
      this.toast('Scénario remplacé');
    },
    logistiquePrompt() {
      return `Tu es chef de production vidéo. Suggère le matériel à louer et un lieu de tournage adapté à ce projet.\nRéponds en JSON avec ces clés exactes : matos (array de strings, ex: "Steadicam", "Drone DJI"), lieu (string, description du lieu suggéré).`;
    },
    async generateLogistique() {
      this.logistiqueLoading = true; this.logistiqueError='';
      try {
        const text = await this.callClaude(this.logistiquePrompt(), this.projectContext() + `\nNombre de plans: ${(this.currentProject.decoupage||[]).length}`);
        const j = this.extractJson(text);
        this.currentProject.matos = j.matos || []; this.currentProject.lieu = j.lieu || this.currentProject.lieu;
        this.saveProjects();
        this.toast('Logistique suggérée');
      } catch(e) {
        this.logistiqueError = 'Erreur Claude. Réessaie.';
      } finally {
        this.logistiqueLoading = false;
      }
    },
    addDecoupageRow() {
      if (!this.currentProject.decoupage) this.currentProject.decoupage = [];
      const n = this.currentProject.decoupage.length + 1;
      this.currentProject.decoupage.push({ plan: `${n}.1`, focale: '', description: '', heure: '', intention: '', son: '', fait: false, transition: false });
      this.saveProjects();
    },
    addMatosItem() {
      if (!this.newMatosItem.trim()) return;
      if (!this.currentProject.matos) this.currentProject.matos = [];
      this.currentProject.matos.push(this.newMatosItem);
      this.newMatosItem = '';
      this.saveProjects();
    },
    async generateCaptions() {
      this.captionsLoading = true; this.captionsError='';
      try {
        const text = await this.callClaude(
          `Tu es expert réseaux sociaux. Génère 4 captions adaptées à ce projet vidéo.\nRéponds en JSON avec les clés exactes : instagram, tiktok, linkedin, twitter.\ninstagram: avec emojis, hashtags, CTA. tiktok: accroche + corps + hashtags. linkedin: ton pro. twitter: 280 caractères max.`,
          this.projectContext()
        );
        this.currentProject.captions = this.extractJson(text);
        this.saveProjects();
        this.toast('Captions générées');
      } catch(e) {
        this.captionsError = 'Erreur Claude. Réessaie.';
      } finally {
        this.captionsLoading = false;
      }
    },
    addChecklistItem() {
      if (!this.newChecklistItem.trim()) return;
      if (!this.currentProject.checklist) this.currentProject.checklist = [];
      this.currentProject.checklist.push({ label: this.newChecklistItem, done:false });
      this.newChecklistItem = '';
      this.saveProjects();
    },

    // ---------- NOTION EXPORT ----------
    // Export manuel, à la demande — contenu créatif uniquement (pas de coordonnées
    // client) pour rester compatible avec le choix RGPD du CRM.
    notionRichText(text) {
      const chunks = [];
      const s = String(text || '');
      for (let i = 0; i < s.length; i += 1900) chunks.push(s.slice(i, i + 1900));
      return (chunks.length ? chunks : ['']).map(c => ({ type:'text', text:{ content:c } }));
    },
    notionParagraph(text) { return { object:'block', type:'paragraph', paragraph:{ rich_text: this.notionRichText(text) } }; },
    notionHeading(text) { return { object:'block', type:'heading_2', heading_2:{ rich_text: this.notionRichText(text) } }; },
    notionBullet(text) { return { object:'block', type:'bulleted_list_item', bulleted_list_item:{ rich_text: this.notionRichText(text) } }; },
    notionToggle(title, color, children) {
      return { object:'block', type:'toggle', toggle:{ rich_text: this.notionRichText(title), color, children: children.length ? children : [this.notionParagraph('')] } };
    },
    notionCallout(emoji, text, color) {
      return { object:'block', type:'callout', callout:{ rich_text: this.notionRichText(text), icon:{ type:'emoji', emoji }, color } };
    },
    notionTableRow(cells) {
      return { object:'block', type:'table_row', table_row:{ cells: cells.map(c => this.notionRichText(c)) } };
    },
    // Reproduit la structure exacte du template de préproduction : toggles
    // PITCH/SCÉNARIO/MATOS À LOUER/LIEU DE TOURNAGE, callouts Idées/À penser,
    // tableau Découpage Technique, section Moodboard.
    buildNotionBlocks(p) {
      const blocks = [];
      blocks.push(this.notionToggle('PITCH', 'yellow_background', p.pitch ? [this.notionParagraph(p.pitch)] : []));
      blocks.push(this.notionToggle('SCÉNARIO', 'green_background', p.scenario ? p.scenario.split('\n').map(l => this.notionParagraph(l)) : []));
      blocks.push(this.notionToggle('MATOS À LOUER', 'gray_background', (p.matos||[]).map(m => this.notionBullet(m))));
      blocks.push(this.notionToggle('LIEU DE TOURNAGE', 'blue_background', p.lieu ? [this.notionParagraph(p.lieu)] : []));

      if (p.idees) blocks.push(this.notionCallout('💡', p.idees, 'yellow_background'));
      if (p.aPenser) blocks.push(this.notionCallout('❗', p.aPenser, 'red_background'));

      if (p.decoupage && p.decoupage.length) {
        blocks.push(this.notionHeading('Découpage Technique'));
        const rows = [this.notionTableRow(['Plan','Focale / Angle','Description','heure','Fait'])];
        for (const s of p.decoupage) {
          rows.push(this.notionTableRow([s.plan || '', s.transition ? 'TRANSITION' : (s.focale||''), s.description||'', s.heure||'', s.fait ? '✓' : '']));
        }
        blocks.push({ object:'block', type:'table', table:{ table_width:5, has_column_header:true, has_row_header:false, children:rows } });
      }

      if (p.captions && Object.keys(p.captions).length) {
        blocks.push(this.notionHeading('Captions / Réseaux'));
        for (const [net, text] of Object.entries(p.captions)) {
          if (text) blocks.push(this.notionParagraph(net.toUpperCase() + ' — ' + text));
        }
      }

      blocks.push(this.notionHeading('Moodboard'));
      blocks.push(this.notionParagraph(p.moodboardNotes || 'Palette, références visuelles, ambiance — à compléter dans Notion.'));

      return blocks.slice(0, 100);
    },
    async exportToNotion() {
      const p = this.currentProject;
      this.notionExportLoading = true; this.notionExportError = '';
      try {
        const properties = {
          Nom: { title: [{ text: { content: p.title || 'Sans titre' } }] },
          Client: { rich_text: [{ text: { content: p.client || '' } }] },
          Type: { select: { name: p.type || 'Autre' } },
          Statut: { select: { name: this.statusLabel(p.status) || 'Brief' } },
          Budget: { number: p.budget ? Number(p.budget) : null },
          Avancement: { number: (p.progress || 0) / 100 },
        };
        if (p.deadline) properties.Deadline = { date: { start: p.deadline } };

        if (p.notionPageId) {
          await fetch(`/api/notion.js?endpoint=pages/${p.notionPageId}`, {
            method: 'PATCH',
            headers: { 'Content-Type':'application/json' },
            body: JSON.stringify({ properties }),
          });
        } else {
          const res = await fetch(`/api/notion.js?endpoint=pages`, {
            method: 'POST',
            headers: { 'Content-Type':'application/json' },
            body: JSON.stringify({
              parent: { database_id: '387ad81d-a4bc-812a-9650-e8b28b058e76' },
              properties,
              children: this.buildNotionBlocks(p),
            }),
          });
          const page = await res.json();
          if (page.id) {
            p.notionPageId = page.id;
            p.notionUrl = page.url || ('https://notion.so/' + page.id.replace(/-/g,''));
          } else {
            throw new Error(page.message || 'Erreur Notion');
          }
        }
        this.saveProjects();
        this.toast('Exporté vers Notion');
      } catch(e) {
        this.notionExportError = 'Erreur Notion. Réessaie.';
      } finally {
        this.notionExportLoading = false;
      }
    },

    // ---------- STUDIO ----------
    applyStudioProject() {
      const p = this.projects.find(pr => pr.id === this.studioSelectedProjectId);
      if (!p) return;
      const sujet = p.title + (p.pitch ? ' — ' + p.pitch : (p.briefRaw ? ' — ' + p.briefRaw : ''));
      switch (this.studioType) {
        case 'script':
          this.studioForm.theme = sujet;
          if (['Film de marque','Vlog','TikTok','Interview','Podcast','Docu'].includes(p.type)) this.studioForm.scriptKind = p.type;
          break;
        case 'shotlist':
          this.studioForm.typeVideo = p.type + ' — ' + p.title;
          break;
        case 'idees':
          this.studioForm.secteur = p.client;
          break;
        case 'captions':
          this.studioForm.descriptionVideo = sujet;
          break;
        case 'interview':
          this.studioForm.profil = p.client;
          this.studioForm.themeInterview = sujet;
          break;
        case 'email':
          break;
      }
    },
    toggleEquip(eq) {
      if (!this.studioForm.equip) this.studioForm.equip = [];
      const i = this.studioForm.equip.indexOf(eq);
      if (i>-1) this.studioForm.equip.splice(i,1); else this.studioForm.equip.push(eq);
    },
    studioPrompt() {
      const f = this.studioForm;
      switch(this.studioType) {
        case 'script':
          return { system:'Tu es scénariste vidéo professionnel. Génère un script complet formaté.', msg:`Type: ${f.scriptKind}\nDurée cible: ${f.duree}\nThème: ${f.theme}\nTon: ${f.ton}` };
        case 'shotlist':
          return { system:'Tu es 1er assistant réalisateur. Génère une shot list adaptée, sous forme de texte structuré lisible (pas de JSON).', msg:`Type de vidéo: ${f.typeVideo}\nNombre de plans: ${f.nbPlans}\nLieu: ${f.lieu}\nÉquipement disponible: ${(f.equip||[]).join(', ')}` };
        case 'idees':
          return { system:'Tu es stratège de contenu vidéo. Génère 10 idées de vidéos avec titre accrocheur, angle, format et durée recommandée pour chaque idée.', msg:`Secteur client: ${f.secteur}\nObjectif: ${f.objectif}\nPlateforme cible: ${f.plateforme}` };
        case 'captions':
          return { system:'Tu es expert réseaux sociaux. Génère 5 variantes de hook et une caption complète.', msg:`Description vidéo: ${f.descriptionVideo}\nPlateforme: ${f.plateforme2}\nTon: ${f.ton2}` };
        case 'interview':
          return { system:'Tu es journaliste expert en interviews vidéo. Génère 15 questions structurées en 3 blocs.', msg:`Profil interviewé: ${f.profil}\nThème: ${f.themeInterview}\nDurée: ${f.dureeInterview}\nStyle: ${f.styleInterview}` };
        case 'email':
          return { system:'Tu es chargé de production vidéo freelance. Génère un email professionnel prêt à envoyer.', msg:`Contexte: ${f.contexteEmail}\nTon: ${f.tonEmail}` };
      }
    },
    async runStudio() {
      this.studioLoading = true; this.studioError='';
      try {
        const { system, msg } = this.studioPrompt();
        const text = await this.callClaude(system, msg);
        this.studioResult = text;
        this.studioHistory.unshift({ type:this.studioType, label: this.studioTypes.find(t=>t.id===this.studioType).label + ' — ' + new Date().toLocaleString('fr-FR'), result:text });
        this.studioHistory = this.studioHistory.slice(0,5);
        localStorage.setItem('mp_studio_history', JSON.stringify(this.studioHistory));
      } catch(e) {
        this.studioError = 'Erreur Claude. Réessaie.';
      } finally {
        this.studioLoading = false;
      }
    },
    saveStudioResultToProject(p) {
      p.notes = (p.notes||'') + '\n\n--- Studio IA ---\n' + this.studioResult;
      this.saveProjects();
      this.saveToProjectOpen = false;
      this.toast('Sauvegardé dans ' + p.title);
    },

    // ---------- CLIENTS ----------
    get filteredClients() {
      const q = this.clientSearch.toLowerCase();
      return this.allClients
        .map(c => ({ name: c.nom, id: c.id, count: this.projects.filter(p => p.clientId === c.id).length }))
        .filter(c => !q || c.name.toLowerCase().includes(q));
    },
    openClient(c) { this.currentClient = c; },

    // ---------- SETTINGS / DATA ----------
    exportData() {
      const blob = new Blob([JSON.stringify({ projects:this.projects, settings:this.settings }, null, 2)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'moustikprod-studio-export.json'; a.click();
      this.toast('Export généré');
    },
    importData(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.projects) { this.projects = data.projects; this.saveProjects(); }
          if (data.settings) { this.settings = data.settings; this.saveSettings(); }
          this.toast('Import réussi');
        } catch(err) {
          this.toast('Fichier invalide', 'error');
        }
      };
      reader.readAsText(file);
    },
    resetData() {
      if (!confirm('Effacer le cache local (historique IA) ? Les projets et clients restent sur Firestore.')) return;
      localStorage.removeItem('mp_studio_history');
      this.studioHistory = [];
      this.toast('Cache local effacé');
    },

    // ---------- DELETE PROJECT ----------
    async deleteProject() {
      const p = this.projectPendingDelete;
      if (!p) return;
      if (this.db && this.user) {
        try {
          await this.db.collection('users').doc(this.user.uid).collection('projets').doc(p.id).delete();
        } catch(e) { /* continue même si Firestore échoue */ }
      }
      this.projects = this.projects.filter(pr => pr.id !== p.id);
      this.saveProjects();
      this.deleteProjectConfirmOpen = false;
      this.projectPendingDelete = null;
      if (this.currentProject && this.currentProject.id === p.id) {
        this.currentProject = null;
        this.view = 'projets';
      }
      this.toast('Projet supprimé');
    }
  }
}
</script>
