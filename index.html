    async exploreAngles() {
      this.exploreAnglesLoading = true; this.exploreAnglesError = '';
      try {
        const p = this.currentProject;
        const text = await this.callClaude(
          'Tu es directeur créatif.',
          `Pour ce projet :\n- Titre : ${p.title}\n- Client : ${p.client || 'non précisé'}\n- Type : ${p.type || 'non précisé'}\n- Brief actuel : ${p.pitch || 'non renseigné'}\n\nPropose 3 angles créatifs très différents. Format strict :\n**ANGLE 1 — [titre court]**\n[2-3 phrases décrivant l'approche narrative, le ton, les plans clés]\n\n**ANGLE 2 — [titre court]**\n[2-3 phrases]\n\n**ANGLE 3 — [titre court]**\n[2-3 phrases]`
        );
        this.creativeAngles = this.parseAngles(text);
      } catch(e) {
        this.exploreAnglesError = 'Erreur Claude. Réessaie.';
      } finally {
        this.exploreAnglesLoading = false;
      }
    },
    parseAngles(text) {
      const matches = [...text.matchAll(/\*\*ANGLE\s*\d+\s*—\s*([^*]+)\*\*/gi)];
      return matches.map((m, i) => {
        const start = m.index + m[0].length;
        const end = i + 1 < matches.length ? matches[i + 1].index : text.length;
        return { title: m[1].trim(), description: text.slice(start, end).trim() };
      });
    },

      this.currentProject.pitch = angle.description;
      this.saveProjects();
      this.toast("Pitch remplacé par l'angle choisi");

    async suggestMoodboardRefs() {

    decoupagePrompt() {

        : '';
      return `Tu es un 1er assistant caméra expert en tournage vidéo.\nGénère une shot list pour ce projet.${moodboardCtx}\n\nGénère 8 à 12 plans. Pour chaque plan, réponds UNIQUEMENT avec ce format JSON array (sans markdown) :\n[\n  {"plan": "01", "focale": "Grand angle 16mm", "description": "Plan d'ouverture — vue d'ensemble du lieu", "heure": "08:00", "intention": "Contemplatif", "son": "Ambiance naturelle"},\n  ...\n]\n\nintention doit être l'une de : Contemplatif, Descriptif, Immersif, Dynamique, Émotionnel.\nson doit être l'un de : Ambiance naturelle, Voix off, Musique, Silence, Interview.\nSois précis et concis. Un plan = une ligne JSON.`;
    },
    async generateDecoupage() {

          ? p.scenario.slice(0, 3000) + '...[tronqué]'

        if (!jsonMatch) throw new Error('Réponse non JSON');

          plan: pl.plan || '', focale: pl.focale || '', description: pl.description || '',

    async analyzeScenario() {
      if ((this.currentProject.scenario || '').length <= 50) {
        this.scenarioCritiqueError = "Écris d'abord un scénario.";
        return;
      }
      this.scenarioCritiqueLoading = true; this.scenarioCritiqueError = '';
      try {
        const p = this.currentProject;
        const text = await this.callClaude(
          'Tu es un script doctor expert en vidéo courte (vlog, Film de marque, TikTok).',
          `Analyse ce scénario pour une vidéo ${p.type || 'vidéo'} intitulée "${p.title}" pour le client ${p.client || 'non précisé'} :\n\n---\n${p.scenario}\n---\n\nRéponds en 3 sections séparées par ===SECTION=== :\n\nSECTION 1 — CE QUI EST FORT :\n2-3 points forts précis (cite des éléments du scénario).\n\n===SECTION===\n\nSECTION 2 — CE QUI EST FAIBLE OU MANQUE :\n2-3 problèmes concrets avec suggestions de correction.\n\n===SECTION===\n\nSECTION 3 — VERSION AMÉLIORÉE :\nRéécris le scénario en corrigeant les faiblesses. Garde la structure de l'auteur, renforce les passages faibles. Commence directement par le texte réécrit.`
        );
        const stripHeading = s => (s || '').trim().replace(/^[\s\S]*?SECTION\s*\d+\s*—[^\n]*\n+/i, '').trim();
        const [strengths, weaknesses, improved] = text.split('===SECTION===').map(stripHeading);
        this.scenarioCritique = { strengths: strengths || '', weaknesses: weaknesses || '', improved: improved || '' };
      } catch(e) {
        this.scenarioCritiqueError = 'Erreur Claude. Réessaie.';
      } finally {
        this.scenarioCritiqueLoading = false;
      }
    },

    // ---------- NOTION EXPORT ----------
    // Export manuel, à la demande — contenu créatif uniquement (pas de coordonnées
    // client) pour rester compatible avec le choix RGPD du CRM.
    notionRichText(text) {
      const chunks = [];
      const s = String(text || '');
      for (let i = 0; i < s.length; i += 1900) chunks.push(s.slice(i, i + 1900));
      return (chunks.length ? chunks : ['']).map(c => ({ type:'text', text:{ content:c } }));
    },
    notionParagraph(text) { return { object:'block', type:'paragraph', paragraph:{ rich_text: this.notionRichText(text) } }; },
    notionHeading(text) { return { object:'block', type:'heading_2', heading_2:{ rich_text: this.notionRichText(text) } }; },
    notionBullet(text) { return { object:'block', type:'bulleted_list_item', bulleted_list_item:{ rich_text: this.notionRichText(text) } }; },
    notionToggle(title, color, children) {
      return { object:'block', type:'toggle', toggle:{ rich_text: this.notionRichText(title), color, children: children.length ? children : [this.notionParagraph('')] } };
    },
    notionCallout(emoji, text, color) {
      return { object:'block', type:'callout', callout:{ rich_text: this.notionRichText(text), icon:{ type:'emoji', emoji }, color } };
    },
    notionTableRow(cells) {
      return { object:'block', type:'table_row', table_row:{ cells: cells.map(c => this.notionRichText(c)) } };
    },
    // Reproduit la structure exacte du template de préproduction : toggles
    // PITCH/SCÉNARIO/MATOS À LOUER/LIEU DE TOURNAGE, callouts Idées/À penser,
    // tableau Découpage Technique, section Moodboard.
    buildNotionBlocks(p) {
      const blocks = [];
      blocks.push(this.notionToggle('PITCH', 'yellow_background', p.pitch ? [this.notionParagraph(p.pitch)] : []));
      blocks.push(this.notionToggle('SCÉNARIO', 'green_background', p.scenario ? p.scenario.split('\n').map(l => this.notionParagraph(l)) : []));
      blocks.push(this.notionToggle('MATOS À LOUER', 'gray_background', (p.matos||[]).map(m => this.notionBullet(m))));
      blocks.push(this.notionToggle('LIEU DE TOURNAGE', 'blue_background', p.lieu ? [this.notionParagraph(p.lieu)] : []));

      if (p.idees) blocks.push(this.notionCallout('💡', p.idees, 'yellow_background'));
      if (p.aPenser) blocks.push(this.notionCallout('❗', p.aPenser, 'red_background'));

      if (p.decoupage && p.decoupage.length) {
        blocks.push(this.notionHeading('Découpage Technique'));
        const rows = [this.notionTableRow(['Plan','Focale / Angle','Description','heure','Fait'])];
        for (const s of p.decoupage) {
          rows.push(this.notionTableRow([s.plan || '', s.transition ? 'TRANSITION' : (s.focale||''), s.description||'', s.heure||'', s.fait ? '✓' : '']));
        }
        blocks.push({ object:'block', type:'table', table:{ table_width:5, has_column_header:true, has_row_header:false, children:rows } });
      }

      if (p.captions && Object.keys(p.captions).length) {
        blocks.push(this.notionHeading('Captions / Réseaux'));
        for (const [net, text] of Object.entries(p.captions)) {
          if (text) blocks.push(this.notionParagraph(net.toUpperCase() + ' — ' + text));
        }
      }

      blocks.push(this.notionHeading('Moodboard'));
      blocks.push(this.notionParagraph(p.moodboardNotes || 'Palette, références visuelles, ambiance — à compléter dans Notion.'));

      return blocks.slice(0, 100);
    },
    async exportToNotion() {

      try {

    isMineur(dateNaissance) {

      const d = new Date(dateNaissance), now = new Date();

      return age < 18;

    // Chargement — collection par document (users/{uid}/autorisations/{id}).
    // Migre automatiquement l'ancien format blob du CRM (doc unique "items").
    async loadAutorisations() {
      try {
        const col = this.db.collection('users').doc(this.user.uid).collection('autorisations');
        const snap = await col.get();
        const list = [];
        for (const d of snap.docs) {
          const data = d.data();
          if (d.id === 'items' && Array.isArray(data.items)) {
            for (const item of data.items) {
              const id = item.id || ('a' + Date.now() + Math.random().toString(36).slice(2, 6));
              const doc = { ...item, id };
              await col.doc(id).set(doc);
              list.push(doc);
            }
            await col.doc('items').delete();
          } else {
            list.push(data);
          }
        }
        this.autorisations = list;
      } catch(e) {
        console.error('loadAutorisations', e);
      }
    },

    // Création de la demande via /api/signature (authentifié, compte de service) :
    // la collection signatureRequests reste inaccessible depuis le navigateur.
    async envoyerPourSignature(a) {
      const token = (crypto.randomUUID ? crypto.randomUUID() + crypto.randomUUID() : (Date.now() + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2))).replace(/-/g,'');
      const projet = this.projects.find(p => p.id === a.projetId) || {};
      const payload = {
        token,
        type: 'autorisation',
        docId: a.id,
        clientEmail: a.email || '',
        titre: projet.title || '',
        contenu: { ...JSON.parse(JSON.stringify(a)), clientNom: (a.prenom+' '+a.nom).trim(), projetTitre: projet.title || '' },
        htmlContent: this.texteAutorisationHtml(a),
        dateExpiration: new Date(Date.now() + 30*24*60*60*1000).toISOString(),
      };
      try {
        const res = await this.apiFetch('/api/signature', { method:'POST', body: JSON.stringify({ action:'create', payload }) });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'Erreur');
      } catch(e) {
        this.toast('Erreur création du lien : ' + e.message, 'error');
        return;
      }
      a.signatureToken = token;
      a.statut = 'envoyé';
      a.signatureEnvoyeLe = new Date().toISOString();
      await this.db.collection('users').doc(this.user.uid).collection('autorisations').doc(a.id).set({ signatureToken: token, statut:'envoyé', signatureEnvoyeLe: a.signatureEnvoyeLe }, { merge:true });
      const lien = this.signLink(a);
      try { await navigator.clipboard.writeText(lien); } catch(e) {}
      this.toast('Lien de signature copié !');
      if (a.email) {
        try {
          await this.apiFetch('/api/send-email', { method:'POST', body: JSON.stringify({
            to: a.email,
            subject: `Autorisation de droit à l'image à signer — ${this.settings.nomCommercial||'Moustikprod'}`,
            html: `<div style="font-family:sans-serif;max-width:600px;margin:0 auto"><p>Bonjour ${a.prenom || ''},</p><p>Dans le cadre du projet <strong>${projet.title || ''}</strong>, merci de signer électroniquement l'autorisation d'exploitation de l'image via ce lien :</p><p style="text-align:center;margin:24px 0"><a href="${lien}" style="background:#3CD6D1;color:#024059;padding:12px 24px;border-radius:6px;text-decoration:none;font-weight:bold">Signer le document</a></p><p>Ce lien expire dans 30 jours.</p><p>Merci !<br><strong>${this.settings.prenom||'Romain'} — ${this.settings.nomCommercial||'Moustikprod'}</strong></p></div>`,
          })});
          this.toast('Email envoyé à ' + a.email);
        } catch(e) {
          this.toast('Lien copié mais email non envoyé', 'error');
        }
      }
    },
    async verifierSignatures() {
      const pending = this.autorisations.filter(a => a.signatureToken && a.statut !== 'signé');
      if (!pending.length) { this.toast('Aucune signature en attente'); return; }
      this.checkingSignatures = true;
      try {
        const res = await this.apiFetch('/api/signature', { method:'POST', body: JSON.stringify({ action:'status', tokens: pending.map(a => a.signatureToken) }) });
        const data = await res.json();
        let updated = 0;
        for (const r of (data.results || [])) {
          const a = pending.find(x => x.signatureToken === r.token);
          if (!a) continue;
          if (r.statut === 'signé') {
            a.statut = 'signé';
            a.signatureData = r.signatureData;
            a.dateSignature = r.dateSignature;
            a.nomSignataire = r.nomSignataire;
            await this.db.collection('users').doc(this.user.uid).collection('autorisations').doc(a.id).set({ statut:'signé', signatureData: r.signatureData || null, dateSignature: r.dateSignature || null, nomSignataire: r.nomSignataire || null }, { merge:true });
            updated++;
          } else if (r.statut === 'refusé') {
            a.statut = 'refusé';
            await this.db.collection('users').doc(this.user.uid).collection('autorisations').doc(a.id).set({ statut:'refusé' }, { merge:true });
            updated++;
          }
        }
        this.toast(updated ? `${updated} signature(s) mise(s) à jour` : 'Rien de nouveau — toujours en attente');
      } catch(e) {
        this.toast('Erreur de vérification', 'error');
      } finally {
        this.checkingSignatures = false;
      }
    },

    // ---------- CALENDRIER ----------
    calTitle() {
      return new Date(this.calYear, this.calMonth, 1).toLocaleDateString('fr-FR', { month:'long', year:'numeric' }).replace(/^./, c => c.toUpperCase());
    },
    calPrev() { this.calMonth--; if (this.calMonth < 0) { this.calMonth = 11; this.calYear--; } },
    calNext() { this.calMonth++; if (this.calMonth > 11) { this.calMonth = 0; this.calYear++; } },
    calendarEvents() {
      const evs = [];
      for (const p of this.projects) {
        if (p.deadline && !['facture'].includes(p.status)) {
          evs.push({ date: p.deadline, label: '🎬 ' + p.title, tag:'Deadline', cls:'bg-accent/15 text-accent', projectId: p.id, done: p.status==='livraison' });
        }
        if (p.status === 'tournage' && p.deadline) {
          evs.push({ date: p.deadline, label: '📷 Tournage — ' + p.title, tag:'Tournage', cls:'bg-amber-100 text-amber-700', projectId: p.id });
        }
      }
      for (const a of this.autorisations) {
        if (a.statut === 'envoyé' && a.signatureEnvoyeLe) {
          const exp = new Date(new Date(a.signatureEnvoyeLe).getTime() + 30*24*60*60*1000).toISOString().slice(0,10);
          evs.push({ date: exp, label: '✍️ Expiration signature — ' + (a.prenom+' '+a.nom).trim(), tag:'Signature', cls:'bg-red-100 text-red-600', projectId: a.projetId || null });
        }
      }
      return evs;
    },
    calDays() {
      const first = new Date(this.calYear, this.calMonth, 1);
      const daysInMonth = new Date(this.calYear, this.calMonth + 1, 0).getDate();
      const offset = (first.getDay() + 6) % 7; // lundi = 0
      const todayStr = new Date().toISOString().slice(0,10);
      const evs = this.calendarEvents();
      const cells = Array(offset).fill(null);
      for (let n = 1; n <= daysInMonth; n++) {
        const dateStr = `${this.calYear}-${String(this.calMonth+1).padStart(2,'0')}-${String(n).padStart(2,'0')}`;
        cells.push({ n, dateStr, isToday: dateStr === todayStr, events: evs.filter(e => e.date === dateStr) });
      }
      return cells;
    },
    upcomingEvents() {
      const todayStr = new Date().toISOString().slice(0,10);
      return this.calendarEvents()
        .filter(e => !e.done)
        .map(e => ({ ...e, overdue: e.date < todayStr, dateLabel: new Date(e.date + 'T00:00:00').toLocaleDateString('fr-FR', { day:'numeric', month:'short' }) + (e.date < todayStr ? ' — en retard' : '') }))
        .filter(e => e.overdue || (new Date(e.date) - new Date()) < 60*24*60*60*1000)
        .sort((a,b) => a.date.localeCompare(b.date))
        .slice(0, 12);
    },

    // ---------- DELETE PROJECT ----------
    async deleteProject() {
      const p = this.projectPendingDelete;
      if (!p) return;
      if (this.db && this.user) {
        try {
          await this.db.collection('users').doc(this.user.uid).collection('projets').doc(p.id).delete();
        } catch(e) { /* continue même si Firestore échoue */ }
      }
      this.projects = this.projects.filter(pr => pr.id !== p.id);
      this.saveProjects();
      this.deleteProjectConfirmOpen = false;
      this.projectPendingDelete = null;
      if (this.currentProject && this.currentProject.id === p.id) {
        this.currentProject = null;
        this.view = 'projets';
      }
      this.toast('Projet supprimé');
    }
  }
}
</script>
